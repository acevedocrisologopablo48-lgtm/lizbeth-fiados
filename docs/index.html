<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4c1d95">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Control de fiados del negocio escolar de Lizbeth">
    <title>Fiados Lizbeth</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     PANTALLA DE CONFIGURACIÓN (solo si falta credenciales Supabase)
════════════════════════════════════════════════════════════════════════════ -->
<div id="setupScreen" class="setup-screen hidden">
    <div class="setup-card">
        <h2>⚙️ Configuración</h2>
        <p>Ingresa tus credenciales de Supabase.<br>Solo se hace una vez y se guarda en el dispositivo.</p>

        <div class="setup-field">
            <label for="inputSupabaseUrl">URL de Supabase</label>
            <input id="inputSupabaseUrl" type="url" placeholder="https://xxxx.supabase.co" autocomplete="off" spellcheck="false">
        </div>
        <div class="setup-field">
            <label for="inputSupabaseKey">Anon / Public Key</label>
            <input id="inputSupabaseKey" type="text" placeholder="eyJhbG..." autocomplete="off" spellcheck="false">
        </div>

        <button class="setup-btn" id="btnSaveSetup">Guardar y continuar →</button>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════════
     APP PRINCIPAL
════════════════════════════════════════════════════════════════════════════ -->
<div id="appMain">

    <!-- HEADER -->
    <header class="header">
        <h1>🍱 Fiados Lizbeth</h1>
        <p class="date" id="headerDate"></p>
    </header>

    <!-- CONTENIDO -->
    <main class="container">

        <!-- Botón de voz -->
        <div class="voice-wrap">
            <button class="voice-btn idle" id="voiceBtn" onclick="onVoiceClick()" aria-label="Dictar venta">
                <span class="voice-icon">🎙️</span>
                <span class="voice-label" id="voiceLabel">DICTAR VENTA</span>
            </button>
        </div>

        <!-- Entrada manual -->
        <section class="manual-section">
            <p class="manual-label">— o escribe —</p>
            <div class="manual-row">
                <input id="manualInput" type="text" placeholder='Ej: "Carlos 3.50"' autocomplete="off" inputmode="text">
                <button onclick="submitManual()">Agregar</button>
            </div>
        </section>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabDia"      onclick="switchTab('dia')">📅 Hoy</button>
            <button class="tab-btn"         id="tabSemanal" onclick="switchTab('semanal')">📊 Semana</button>
        </div>

        <!-- Lista de registros -->
        <div class="table-wrap" id="tableWrap">
            <div class="empty-state">
                <div class="empty-icon">🍽️</div>
                <p>Cargando...</p>
            </div>
        </div>

    </main>

    <!-- BARRA DE ACCIONES (aparece al seleccionar una entrada) -->
    <div class="action-bar" id="actionBar">
        <button class="action-btn btn-edit"   onclick="onCorregir()">✏️ Corregir</button>
        <button class="action-btn btn-delete" onclick="onBorrar()">🗑️ Borrar</button>
        <button class="action-btn btn-export" onclick="onExportar()">📥 Excel</button>
    </div>

    <!-- TOTAL FIJO -->
    <div class="total-bar">
        <div class="total-inner">
            <span class="total-label" id="totalLabel">Total del día</span>
            <span class="total-value" id="totalValue">S/ 0.00</span>
        </div>
    </div>

</div><!-- /appMain -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     OVERLAY + BOTTOM SHEET (compartido para todas las acciones)
════════════════════════════════════════════════════════════════════════════ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeOverlay()"></div>

<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title" id="sheetTitle">¿Registrar esta venta?</h3>
    <div class="sheet-detail" id="sheetDetail"></div>
    <input class="sheet-input hidden" id="sheetInput" type="text">
    <p class="sheet-hint hidden" id="sheetHint"></p>
    <div class="sheet-btns">
        <button class="btn-cancel"  onclick="closeOverlay()">Cancelar</button>
        <button class="btn-confirm" id="btnSheetConfirm" onclick="onSheetConfirm()">Confirmar</button>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════════
     TOAST CONTAINER
════════════════════════════════════════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>


<!-- ═══════════════════════════════════════════════════════════════════════════
     SCRIPTS (orden importante)
════════════════════════════════════════════════════════════════════════════ -->
<script>
    // Mostrar fecha en header
    const now = new Date();
    const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const months = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    document.getElementById("headerDate").textContent =
        `${days[now.getDay()]} ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;
</script>
<!-- CDN: cargar ANTES de nuestros scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/xlsx.full.min.js"></script>
<!-- Nuestros módulos -->
<script src="js/supabase-config.js"></script>
<script src="js/extractor.js"></script>
<script src="js/database.js"></script>
<script src="js/voice.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
